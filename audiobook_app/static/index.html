<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Audiobook | Lyric Video Sync</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/upload.css">
    <link rel="stylesheet" href="/static/css/player.css">
    <link rel="stylesheet" href="/static/css/karaoke.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>PDF to Audiobook</h1>
            <p class="subtitle">Convert PDFs into continuous narration with synchronized lyric-style captions.</p>
        </header>

        <main>
            <section class="panel" id="uploadSection">
                <div class="section-title">
                    <span>[1]</span> Upload PDF
                </div>
                <div class="upload-zone" id="uploadZone">
                    <span class="upload-icon">PDF</span>
                    <div class="upload-text">
                        Drag and drop your PDF here or <b>browse</b>
                    </div>
                    <input type="file" id="fileInput" accept="application/pdf">
                </div>
                <div id="uploadStatus" class="upload-status"></div>
                <div id="pageInfo" class="page-info"></div>
            </section>

            <section class="panel">
                <div class="section-title">
                    <span>[2]</span> Settings and Conversion
                </div>
                <div class="controls-grid">
                    <div class="field-group">
                        <label for="voiceSelect">Voice Narrator</label>
                        <select id="voiceSelect">
                            <option value="">Loading voices...</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <div class="speed-label">
                            <label for="speedRange">Narrator Speed</label>
                            <span id="speedVal" style="font-weight: bold; color: var(--accent-color);">+0%</span>
                        </div>
                        <input type="range" id="speedRange" min="-50" max="50" value="0" step="5">
                    </div>
                </div>

                <div style="margin-top: 2rem;">
                    <button id="convertBtn" class="btn-primary" style="width: 100%;" disabled>
                        Convert to Audiobook
                    </button>
                </div>

                <div id="conversionStatus" class="progress-container hidden">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <div id="statusText" style="margin-top: 0.5rem; font-size: 0.875rem; color: #94a3b8;">
                        Processing: 0 / 0 chunks
                    </div>
                </div>
            </section>

            <section id="playerSection" class="panel hidden">
                <div class="section-title">
                    <span>[3]</span> Lyric Video Player
                </div>
                <div class="player-container">
                    <div id="karaokePanel" class="karaoke-panel">
                        <div class="karaoke-line visible" style="color: #475569; font-size: 1.25rem;">
                            Captions will sync here as audio plays...
                        </div>

                        <div class="video-controls">
                            <div class="progress-bar-container" id="progressBarContainer">
                                <div class="progress-bar-fill" id="progressBarFill"></div>
                            </div>
                            <div class="controls-main">
                                <button id="playPauseBtn" class="control-btn">Play</button>
                                <span id="timeDisplay" class="time-display">0:00 / 0:00</span>
                            </div>
                        </div>

                        <audio id="audioPlayer"></audio>
                    </div>

                    <div id="downloadOptions" class="download-options hidden">
                        <button id="downloadAudioBtn" class="btn-secondary btn-download-audio">
                            Download MP3
                        </button>
                        <button id="downloadVideoBtn" class="btn-primary btn-download-video">
                            Download Video
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/upload.js"></script>
    <script src="/static/js/voices.js"></script>
    <script src="/static/js/convert.js"></script>
    <script src="/static/js/karaoke.js"></script>
    <script src="/static/js/player.js"></script>
</body>
</html>
